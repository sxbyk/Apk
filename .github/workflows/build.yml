        # -------- Kotlin source files --------
        cat > app/src/main/java/com/servermonitor/data/model/Server.kt << 'EOF'
        package com.servermonitor.data.model

        import androidx.room.Entity
        import androidx.room.PrimaryKey

        @Entity(tableName = "servers")
        data class Server(
          @PrimaryKey(autoGenerate = true) val id: Long = 0,
          val name: String,
          val type: String,
          val host: String,
          val port: Int = 0,
          val isEnabled: Boolean = true,
          val lastStatus: Boolean = false,
          val lastResponse: String = "",
          val lastCheckTime: Long = 0L,
          val responseTimeMs: Long = 0L
        )
        EOF

        cat > app/src/main/java/com/servermonitor/data/local/ServerDao.kt << 'EOF'
        package com.servermonitor.data.local

        import androidx.room.*
        import com.servermonitor.data.model.Server
        import kotlinx.coroutines.flow.Flow

        @Dao
        interface ServerDao {
          @Query("SELECT * FROM servers ORDER BY name ASC")
          fun getAll(): Flow<List<Server>>

          @Query("SELECT * FROM servers WHERE id = :id")
          suspend fun getById(id: Long): Server?

          @Insert(onConflict = OnConflictStrategy.REPLACE)
          suspend fun insert(server: Server): Long

          @Update
          suspend fun update(server: Server)

          @Delete
          suspend fun delete(server: Server)
        }
        EOF

        cat > app/src/main/java/com/servermonitor/data/local/AppDatabase.kt << 'EOF'
        package com.servermonitor.data.local

        import android.content.Context
        import androidx.room.Database
        import androidx.room.Room
        import androidx.room.RoomDatabase
        import com.servermonitor.data.model.Server

        @Database(entities = [Server::class], version = 1)
        abstract class AppDatabase : RoomDatabase() {
          abstract fun serverDao(): ServerDao

          companion object {
            @Volatile private var INSTANCE: AppDatabase? = null

            fun getInstance(context: Context): AppDatabase =
              INSTANCE ?: synchronized(this) {
                INSTANCE ?: Room.databaseBuilder(
                  context, AppDatabase::class.java, "server_monitor_db"
                ).build().also { INSTANCE = it }
              }
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/data/repository/ServerRepository.kt << 'EOF'
        package com.servermonitor.data.repository

        import com.servermonitor.data.local.ServerDao
        import com.servermonitor.data.model.Server
        import kotlinx.coroutines.flow.Flow

        class ServerRepository(private val dao: ServerDao) {
          val allServers: Flow<List<Server>> = dao.getAll()

          suspend fun getById(id: Long): Server? = dao.getById(id)

          suspend fun insert(server: Server): Long = dao.insert(server)

          suspend fun update(server: Server) = dao.update(server)

          suspend fun delete(server: Server) = dao.delete(server)
        }
        EOF

        cat > app/src/main/java/com/servermonitor/util/MonitorChecker.kt << 'EOF'
        package com.servermonitor.util

        import com.servermonitor.data.model.Server
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.withContext
        import okhttp3.OkHttpClient
        import okhttp3.Request
        import java.net.*

        object MonitorChecker {

          private val client = OkHttpClient.Builder()
            .connectTimeout(10, java.util.concurrent.TimeUnit.SECONDS)
            .readTimeout(10, java.util.concurrent.TimeUnit.SECONDS)
            .build()

          data class CheckResult(
            val success: Boolean,
            val response: String,
            val responseTimeMs: Long
          )

          suspend fun check(server: Server): CheckResult = withContext(Dispatchers.IO) {
            val start = System.currentTimeMillis()
            try {
              when (server.type) {
                "Website", "RestApi", "TelegramBot" -> checkHttp(server.host, server.port)
                "Minecraft" -> checkTcp(server.host, server.port)
                "TCP" -> checkTcp(server.host, server.port)
                "Ping" -> checkPing(server.host)
                "Steam" -> checkTcp(server.host, server.port)
                "Database" -> checkTcp(server.host, server.port)
                else -> CheckResult(false, "Unknown type", 0)
              }.let {
                it.copy(responseTimeMs = System.currentTimeMillis() - start)
              }
            } catch (e: Exception) {
              CheckResult(false, e.message ?: "Error", System.currentTimeMillis() - start)
            }
          }

          private fun checkHttp(host: String, port: Int): CheckResult {
            val url = if (port > 0) "http://$host:$port" else "http://$host"
            val request = Request.Builder().url(url).build()
            client.newCall(request).execute().use { response ->
              if (response.isSuccessful) CheckResult(true, "HTTP ${response.code}", 0)
              else CheckResult(false, "HTTP ${response.code}", 0)
            }
          }

          private fun checkTcp(host: String, port: Int): CheckResult {
            return try {
              Socket().use { socket ->
                socket.connect(InetSocketAddress(host, port), 3000)
                CheckResult(true, "Connected", 0)
              }
            } catch (e: Exception) {
              CheckResult(false, e.message ?: "Connection failed", 0)
            }
          }

          private fun checkPing(host: String): CheckResult {
            return try {
              val address = InetAddress.getByName(host)
              if (address.isReachable(3000)) CheckResult(true, "Reachable", 0)
              else CheckResult(false, "Unreachable", 0)
            } catch (e: Exception) {
              CheckResult(false, e.message ?: "Ping failed", 0)
            }
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/service/NotificationHelper.kt << 'EOF'
        package com.servermonitor.service

        import android.app.NotificationChannel
        import android.app.NotificationManager
        import android.content.Context
        import androidx.core.app.NotificationCompat
        import androidx.core.app.NotificationManagerCompat
        import com.servermonitor.data.model.Server

        object NotificationHelper {
          private const val CHANNEL_ID = "server_monitor_channel"

          fun createChannel(context: Context) {
            val channel = NotificationChannel(
              CHANNEL_ID,
              "Server Status Changes",
              NotificationManager.IMPORTANCE_DEFAULT
            )
            (context.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager)
              .createNotificationChannel(channel)
          }

          fun show(context: Context, server: Server, isOnline: Boolean) {
            val status = if (isOnline) "ONLINE" else "OFFLINE"
            val builder = NotificationCompat.Builder(context, CHANNEL_ID)
              .setSmallIcon(android.R.drawable.ic_dialog_info)
              .setContentTitle("${server.name} is $status")
              .setContentText(server.host)
              .setPriority(NotificationCompat.PRIORITY_DEFAULT)
            try {
              NotificationManagerCompat.from(context).notify(server.id.toInt(), builder.build())
            } catch (_: SecurityException) {}
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/service/BootReceiver.kt << 'EOF'
        package com.servermonitor.service

        import android.content.BroadcastReceiver
        import android.content.Context
        import android.content.Intent
        import androidx.work.ExistingPeriodicWorkPolicy
        import androidx.work.PeriodicWorkRequestBuilder
        import androidx.work.WorkManager
        import java.util.concurrent.TimeUnit

        class BootReceiver : BroadcastReceiver() {
          override fun onReceive(context: Context, intent: Intent?) {
            if (intent?.action == Intent.ACTION_BOOT_COMPLETED) {
              val request = PeriodicWorkRequestBuilder<MonitorWorker>(15, TimeUnit.MINUTES).build()
              WorkManager.getInstance(context)
                .enqueueUniquePeriodicWork("monitor", ExistingPeriodicWorkPolicy.KEEP, request)
            }
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/service/MonitorWorker.kt << 'EOF'
        package com.servermonitor.service

        import android.content.Context
        import androidx.work.CoroutineWorker
        import androidx.work.WorkerParameters
        import com.servermonitor.data.local.AppDatabase
        import com.servermonitor.data.repository.ServerRepository
        import com.servermonitor.util.MonitorChecker
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.withContext

        class MonitorWorker(
          appContext: Context,
          params: WorkerParameters
        ) : CoroutineWorker(appContext, params) {

          override suspend fun doWork(): Result = withContext(Dispatchers.IO) {
            try {
              val db = AppDatabase.getInstance(applicationContext)
              val repo = ServerRepository(db.serverDao())
              val servers = repo.allServers
              servers.collect { list ->
                list.filter { it.isEnabled }.forEach { server ->
                  val result = MonitorChecker.check(server)
                  val newStatus = result.success
                  if (server.lastStatus != newStatus) {
                    NotificationHelper.show(applicationContext, server, newStatus)
                  }
                  repo.update(server.copy(
                    lastStatus = newStatus,
                    lastResponse = result.response,
                    responseTimeMs = result.responseTimeMs,
                    lastCheckTime = System.currentTimeMillis()
                  ))
                }
              }
              Result.success()
            } catch (e: Exception) {
              Result.retry()
            }
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/ui/ServerViewModel.kt << 'EOF'
        package com.servermonitor.ui

        import android.app.Application
        import androidx.lifecycle.AndroidViewModel
        import androidx.lifecycle.viewModelScope
        import com.servermonitor.data.local.AppDatabase
        import com.servermonitor.data.model.Server
        import com.servermonitor.data.repository.ServerRepository
        import com.servermonitor.util.MonitorChecker
        import kotlinx.coroutines.flow.SharingStarted
        import kotlinx.coroutines.flow.stateIn
        import kotlinx.coroutines.launch

        class ServerViewModel(application: Application) : AndroidViewModel(application) {
          private val dao = AppDatabase.getInstance(application).serverDao()
          private val repository = ServerRepository(dao)

          val servers = repository.allServers.stateIn(
            viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList()
          )

          fun addServer(server: Server) = viewModelScope.launch {
            repository.insert(server)
          }

          fun deleteServer(server: Server) = viewModelScope.launch {
            repository.delete(server)
          }

          fun toggleServer(server: Server) = viewModelScope.launch {
            repository.update(server.copy(isEnabled = !server.isEnabled))
          }

          fun checkServer(server: Server) = viewModelScope.launch {
            val result = MonitorChecker.check(server)
            repository.update(server.copy(
              lastStatus = result.success,
              lastResponse = result.response,
              responseTimeMs = result.responseTimeMs,
              lastCheckTime = System.currentTimeMillis()
            ))
          }

          fun checkAll() = viewModelScope.launch {
            servers.value.forEach { server ->
              val result = MonitorChecker.check(server)
              repository.update(server.copy(
                lastStatus = result.success,
                lastResponse = result.response,
                responseTimeMs = result.responseTimeMs,
                lastCheckTime = System.currentTimeMillis()
              ))
            }
          }
        }
        EOF

