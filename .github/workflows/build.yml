name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v3

    - name: Generate Android project
      run: |
        mkdir -p app/src/main/java/com/servermonitor/ui/fragment
        mkdir -p app/src/main/java/com/servermonitor/data/model
        mkdir -p app/src/main/java/com/servermonitor/data/local
        mkdir -p app/src/main/java/com/servermonitor/data/repository
        mkdir -p app/src/main/java/com/servermonitor/service
        mkdir -p app/src/main/java/com/servermonitor/util
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/menu
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/navigation

        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
          repositories {
            google()
            mavenCentral()
            gradlePluginPortal()
          }
        }
        dependencyResolutionManagement {
          repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
          repositories {
            google()
            mavenCentral()
          }
        }
        rootProject.name = "ServerMonitor"
        include(":app")
        EOF

        cat > build.gradle.kts << 'EOF'
        plugins {
          id("com.android.application") version "8.2.0" apply false
          id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          id("com.google.devtools.ksp") version "1.9.22-1.0.17" apply false
        }
        EOF

        cat > app/build.gradle.kts << 'EOF'
        plugins {
          id("com.android.application")
          id("org.jetbrains.kotlin.android")
          id("com.google.devtools.ksp")
        }

        android {
          namespace = "com.servermonitor"
          compileSdk = 34

          defaultConfig {
            applicationId = "com.servermonitor"
            minSdk = 26
            targetSdk = 34
