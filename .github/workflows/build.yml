        package com.servermonitor.ui.fragment

        import android.os.Bundle
        import android.view.*
        import androidx.fragment.app.Fragment
        import androidx.lifecycle.lifecycleScope
        import androidx.navigation.fragment.navArgs
        import com.servermonitor.R
        import com.servermonitor.data.local.AppDatabase
        import com.servermonitor.databinding.FragmentServerDetailBinding
        import kotlinx.coroutines.launch

        class ServerDetailFragment : Fragment(R.layout.fragment_server_detail) {
          private lateinit var binding: FragmentServerDetailBinding
          private val args: ServerDetailFragmentArgs by navArgs()

          override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
            super.onViewCreated(view, savedInstanceState)
            binding = FragmentServerDetailBinding.bind(view)

            lifecycleScope.launch {
              val db = AppDatabase.getInstance(requireContext())
              val server = db.serverDao().getById(args.serverId)
              server?.let {
                binding.tvName.text = it.name
                binding.tvType.text = it.type
                binding.tvHost.text = "${it.host}:${it.port}"
                binding.tvStatus.text = if (it.lastStatus) "ONLINE" else "OFFLINE"
                binding.tvResponse.text = it.lastResponse
                binding.tvResponseTime.text = "${it.responseTimeMs}ms"
              }
            }
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/ui/adapter/ServerAdapter.kt << 'EOF'
        package com.servermonitor.ui.adapter

        import android.view.LayoutInflater
        import android.view.ViewGroup
        import androidx.recyclerview.widget.DiffUtil
        import androidx.recyclerview.widget.ListAdapter
        import androidx.recyclerview.widget.RecyclerView
        import com.servermonitor.data.model.Server
        import com.servermonitor.databinding.ItemServerBinding

        class ServerAdapter(
          private val onItemClick: (Server) -> Unit,
          private val onCheckClick: (Server) -> Unit
        ) : ListAdapter<Server, ServerAdapter.ViewHolder>(DiffCallback()) {

          inner class ViewHolder(private val binding: ItemServerBinding) :
            RecyclerView.ViewHolder(binding.root) {
            fun bind(server: Server) {
              binding.tvName.text = server.name
              binding.tvType.text = server.type
              binding.tvHost.text = server.host
              binding.tvStatus.text = if (server.lastStatus) "ONLINE" else "OFFLINE"
              binding.tvResponse.text = server.lastResponse
              binding.tvResponseTime.text = "${server.responseTimeMs}ms"
              binding.statusIndicator.setBackgroundColor(
                if (server.lastStatus) 0xFF4CAF50.toInt() else 0xFF9E9E9E.toInt()
              )
              binding.root.setOnClickListener { onItemClick(server) }
              binding.btnCheck.setOnClickListener { onCheckClick(server) }
            }
          }

          override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
            val binding = ItemServerBinding.inflate(
              LayoutInflater.from(parent.context), parent, false
            )
            return ViewHolder(binding)
          }

          override fun onBindViewHolder(holder: ViewHolder, position: Int) {
            holder.bind(getItem(position))
          }
        }

        class DiffCallback : DiffUtil.ItemCallback<Server>() {
          override fun areItemsTheSame(oldItem: Server, newItem: Server) = oldItem.id == newItem.id
          override fun areContentsTheSame(oldItem: Server, newItem: Server) = oldItem == newItem
        }
        EOF

