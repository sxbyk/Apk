        cat > app/src/main/java/com/servermonitor/ui/fragment/ServersFragment.kt << 'EOF'
        package com.servermonitor.ui.fragment

        import android.os.Bundle
        import android.view.*
        import androidx.fragment.app.Fragment
        import androidx.lifecycle.ViewModelProvider
        import androidx.navigation.fragment.findNavController
        import androidx.recyclerview.widget.LinearLayoutManager
        import com.servermonitor.R
        import com.servermonitor.data.model.Server
        import com.servermonitor.databinding.FragmentServersBinding
        import com.servermonitor.ui.ServerViewModel
        import com.servermonitor.ui.adapter.ServerAdapter

        class ServersFragment : Fragment(R.layout.fragment_servers) {
          private lateinit var binding: FragmentServersBinding
          private lateinit var viewModel: ServerViewModel
          private lateinit var adapter: ServerAdapter

          override fun onCreateView(
            inflater: LayoutInflater, container: ViewGroup?, savedInstanceState: Bundle?
          ): View {
            binding = FragmentServersBinding.inflate(inflater, container, false)
            return binding.root
          }

          override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
            super.onViewCreated(view, savedInstanceState)
            viewModel = ViewModelProvider(requireActivity())[ServerViewModel::class.java]

            adapter = ServerAdapter(
              onItemClick = { server ->
                findNavController().navigate(
                  R.id.action_serversFragment_to_serverDetailFragment,
                  Bundle().apply { putLong("serverId", server.id) }
                )
              },
              onCheckClick = { server -> viewModel.checkServer(server) }
            )

            binding.recyclerView.layoutManager = LinearLayoutManager(requireContext())
            binding.recyclerView.adapter = adapter

            viewModel.servers.observe(viewLifecycleOwner) { servers ->
              adapter.submitList(servers)
              binding.emptyView.visibility = if (servers.isEmpty()) View.VISIBLE else View.GONE
            }

            binding.fab.setOnClickListener {
              findNavController().navigate(R.id.action_serversFragment_to_addServerFragment)
            }

            setHasOptionsMenu(true)
          }

          override fun onCreateOptionsMenu(menu: Menu, inflater: MenuInflater) {
            inflater.inflate(R.menu.menu_servers, menu)
          }

          override fun onOptionsItemSelected(item: MenuItem): Boolean {
            if (item.itemId == R.id.action_refresh_all) {
              viewModel.checkAll()
              return true
            }
            return super.onOptionsItemSelected(item)
          }
        }
        EOF

        cat > app/src/main/java/com/servermonitor/ui/fragment/AddServerFragment.kt << 'EOF'
        package com.servermonitor.ui.fragment

        import android.os.Bundle
        import android.view.*
        import android.widget.ArrayAdapter
        import android.widget.Toast
        import androidx.fragment.app.Fragment
        import androidx.lifecycle.ViewModelProvider
        import androidx.navigation.fragment.findNavController
        import com.servermonitor.R
        import com.servermonitor.data.model.Server
        import com.servermonitor.databinding.FragmentAddServerBinding
        import com.servermonitor.ui.ServerViewModel

        class AddServerFragment : Fragment(R.layout.fragment_add_server) {
          private lateinit var binding: FragmentAddServerBinding
          private lateinit var viewModel: ServerViewModel

          override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
            super.onViewCreated(view, savedInstanceState)
            binding = FragmentAddServerBinding.bind(view)
            viewModel = ViewModelProvider(requireActivity())[ServerViewModel::class.java]

            binding.spinnerType.adapter = ArrayAdapter.createFromResource(
              requireContext(), R.array.server_types, android.R.layout.simple_spinner_dropdown_item
            )

            binding.btnSave.setOnClickListener {
              val name = binding.etName.text.toString()
              val type = binding.spinnerType.selectedItem.toString()
              val host = binding.etHost.text.toString()
              val port = binding.etPort.text.toString().toIntOrNull() ?: 0
              if (name.isBlank() || host.isBlank()) {
                Toast.makeText(requireContext(), "Name and Host required", Toast.LENGTH_SHORT).show()
              } else {
                viewModel.addServer(Server(name = name, type = type, host = host, port = port))
                findNavController().navigateUp()
              }
            }
          }
        }
        EOF

